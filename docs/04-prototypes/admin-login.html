<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админка — вход</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif; color: #111; background: #f5f5f5; font-size: 14px; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

    .note { background: #fffbe6; border-bottom: 1px solid #e3d896; padding: 8px 16px; font-size: 12px; color: #6b5500; }
    .note b { color: #463600; }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border: 1px solid #ddd;
      padding: 40px 36px;
    }
    .logo {
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.15em;
      font-size: 20px;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center;
      color: #777;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 24px;
    }
    .field { display: flex; flex-direction: column; margin-bottom: 16px; }
    .field label { font-size: 13px; color: #777; margin-bottom: 6px; }
    .field input {
      border: 1px solid #ccc;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .field input:focus { border-color: #111; }
    .field.error input { border-color: #d63838; }
    .field-error { color: #d63838; font-size: 12px; margin-top: 6px; }

    .btn-primary {
      display: block;
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      padding: 14px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 8px;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="note">
    <b>Прототип:</b> вход в админ-панель. Отдельный URL, авторизация по email и паролю.
  </div>

  <div class="center">
    <div class="login-card">
      <div class="logo">КОМНАТА 26</div>
      <div class="sub">Панель управления</div>

      <h1>Вход</h1>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="admin@komnata26.ru">
      </div>

      <div class="field error">
        <label>Пароль</label>
        <input type="password" value="••••••••">
        <span class="field-error">Неверный email или пароль</span>
      </div>

      <button class="btn-primary">Войти</button>
    </div>
  </div>

</body>
</html>
